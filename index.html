<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>welcome to my Library</h2>
    <div class="new-book">
        <button id="new-book-btn">Add New Book</button>
        <dialog id="book-dialog">
            <form id="book-form" method="dialog">
                <h2>Add New Book</h2>

                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required>

                <label for="author">Author:</label>
                <input type="text" id="author" name="author" required>

                <label for="pages">Pages:</label>
                <input type="number" id="pages" name="pages" required>

                <label>
                    <input type="checkbox" id="read" name="read">I have read this book
                </label>

                <div class="form-buttons">
                    <button type="submit" id="submit-btn">Add to Library</button>
                    <button type="button" id="close-btn">Cancel</button>
                </div>
            </form>
        </dialog>
    </div>
    <div id="library-container" class="library-grid"></div>
</body>
</html>
